# =============================================================================
# GraspGen Thesis - Docker Compose
# Usage:
#   1. Copy .env.example to .env and set your HF_TOKEN
#   2. docker compose build --build-arg HF_TOKEN=$(cat .env | grep HF_TOKEN | cut -d= -f2)
#   3. docker compose up -d
#   4. docker compose exec graspgen bash
# =============================================================================

services:
  graspgen:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN:-}
        TORCH_CUDA_ARCH_LIST: ${TORCH_CUDA_ARCH_LIST:-8.6;8.9}
    image: graspgen-thesis:latest
    container_name: graspgen_dev
    ports:
      - "8080:8080"    # Viser / web UI
      - "7860:7860"    # Viser alternate port
      - "7000:7000"
      - "6000:6000"
      - "29999:29999"  # Dobot dashboard (TCP/IP control)
      - "30004:30004"  # Dobot real-time feedback
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=host.docker.internal:0.0
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=42
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - HF_TOKEN=${HF_TOKEN:-}
      - PYTHONPATH=/opt/GraspGen:/opt/Dobot_hv
      - CUDA_HOME=/usr/local/cuda
    volumes:
      # Mount ROS2 workspace packages (your pipeline code)
      - ../ros2_ws/src/graspgen_pipeline:/ros2_ws/src/graspgen_pipeline
      - ../ros2_ws/src/robotiq_3f_driver:/ros2_ws/src/robotiq_3f_driver
      # Persist model weights between rebuilds
      - model_cache:/opt/models
      # Data directory for captured images and results
      - ../data:/ros2_ws/data
      - ../results:/ros2_ws/results
      # Config files
      - ../config:/ros2_ws/config
      # Scripts
      - ../scripts:/ros2_ws/scripts
      # Camera device access (Orbbec USB)
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
    # USB + video device access (more secure than privileged: true)
    device_cgroup_rules:
      - 'c 189:* rwm'   # USB devices (/dev/bus/usb)
      - 'c 180:* rwm'   # USB serial
      - 'c 81:* rwm'    # Video devices (/dev/video*)
    #network_mode: host  # Uncomment for ROS2 multi-machine DDS discovery
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    # Keep the container alive in detached mode (docker compose up -d).
    # The entrypoint prints the status banner, then this command keeps it running.
    # Use `docker compose exec graspgen bash` to get a shell.
    command: ["sleep", "infinity"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  model_cache:
    driver: local

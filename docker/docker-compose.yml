# =============================================================================
# GraspGen Thesis - Docker Compose
# Usage:
#   1. Copy .env.example to .env and set your HF_TOKEN
#   2. docker compose build --build-arg HF_TOKEN=$(cat .env | grep HF_TOKEN | cut -d= -f2)
#   3. docker compose up -d
#   4. docker compose exec graspgen bash
#
# ── PLATFORM NOTES ───────────────────────────────────────────────────────────
# Windows + WSL2 (current default):
#   • DISPLAY=host.docker.internal:0.0  ← requires VcXsrv/X410 running on Windows
#   • extra_hosts host.docker.internal  ← needed so container resolves Windows host
#   • /tmp/.X11-unix volume             ← NOT needed (X server is on Windows side)
#   • Camera USB via usbipd-win + scripts/reattach.ps1
#
# Native Linux:
#   • Comment out:  DISPLAY=host.docker.internal:0.0
#   • Uncomment:    DISPLAY=${DISPLAY}
#   • Uncomment:    /tmp/.X11-unix:/tmp/.X11-unix  volume
#   • Comment out:  extra_hosts block (not needed, host is localhost)
#   • Run on host before starting container: xhost +local:docker
#   • Camera USB works natively — no usbipd-win needed
#   • Verify GPU: nvidia-container-toolkit must be installed on host
# =============================================================================

services:
  graspgen:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN:-}
        TORCH_CUDA_ARCH_LIST: ${TORCH_CUDA_ARCH_LIST:-8.6;8.9}
    image: graspgen-thesis:latest
    container_name: graspgen_dev
    ports:
      - "8080:8080"    # Viser / web UI
      - "7860:7860"    # Viser alternate port
      - "7000:7000"
      - "6000:6000"
      - "29999:29999"  # Dobot dashboard (TCP/IP control)
      - "30004:30004"  # Dobot real-time feedback
    # runtime: nvidia  # Removed: use deploy.resources.reservations.devices below (works with Docker Desktop + nvidia-container-toolkit)
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=host.docker.internal:0.0  # Windows+WSL2: X server on Windows side
      # [LINUX] Comment line above, uncomment line below:
      # - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=42
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - HF_TOKEN=${HF_TOKEN:-}
      - PYTHONPATH=/opt/GraspGen:/opt/Dobot_hv
      - CUDA_HOME=/usr/local/cuda
    volumes:
      # Persist model weights between rebuilds
      - model_cache:/opt/models
      # Data directory for captured images and results
      - ../data:/ros2_ws/data
      - ../results:/ros2_ws/results
      # Scripts (utilities and tests)
      - ../scripts:/ros2_ws/scripts
      # App — final solution (AnySort pipeline)
      - ../app:/ros2_ws/app
      # Camera device access (Orbbec USB)
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      # [LINUX] Uncomment line below for X11 display passthrough (not needed on Windows+WSL2):
      # - /tmp/.X11-unix:/tmp/.X11-unix
    # USB + video device access (more secure than privileged: true)
    device_cgroup_rules:
      - 'c 189:* rwm'   # USB devices (/dev/bus/usb)
      - 'c 180:* rwm'   # USB serial
      - 'c 81:* rwm'    # Video devices (/dev/video*)
    #network_mode: host  # Uncomment for multi-machine DDS discovery (also fixes robot TCP routing on Linux)
    # [WINDOWS+WSL2] Needed so container resolves Windows host for X display:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # [LINUX] Comment out the extra_hosts block above — not needed on native Linux
    stdin_open: true
    tty: true
    # Keep the container alive in detached mode (docker compose up -d).
    # The entrypoint prints the status banner, then this command keeps it running.
    # Use `docker compose exec graspgen bash` to get a shell.
    command: ["sleep", "infinity"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  model_cache:
    driver: local
